<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; color: #0f172a; max-width: 440px; margin: 32px auto; padding: 0 20px; }
    h1 { font-size: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin: 16px 0 6px; }
    input { width: 100%; height: 40px; border: 1.5px solid #cbd5e1; border-radius: 9px; padding: 0 12px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 18px; height: 42px; padding: 0 20px; border: none; border-radius: 11px; background: #1d4ed8; color: #fff; font-weight: 700; cursor: pointer; }
    .hint { font-size: 12.5px; color: #64748b; line-height: 1.5; margin-top: 6px; }
    .ok { color: #15803d; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Conectar con Finanzas</h1>
  <p class="hint">Genera el token en el app: pestaña <b>Facturas → Conectar extensión</b>, y pégalo aquí.</p>
  <label>Token de extensión</label>
  <input id="token" placeholder="Pega el token…" />
  <label>URL del backend</label>
  <input id="backend" placeholder="https://finanzas-abiertas.pages.dev" />
  <div><button id="save">Guardar</button></div>
  <div class="ok" id="ok"></div>
  <script src="options.js"></script>
</body>
</html>
