<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; font-family: -apple-system, system-ui, sans-serif; color: #0f172a; background: #fff; }
    .hd { padding: 14px 16px 10px; border-bottom: 1px solid #e2e8f0; }
    .hd h1 { font-size: 15px; margin: 0; }
    .hd .prov { font-size: 12px; color: #64748b; margin-top: 2px; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 12px; color: #64748b; font-weight: 600; display: flex; flex-direction: column; gap: 5px; }
    input { height: 38px; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 0 11px; font-size: 14px; color: #0f172a; }
    button { height: 42px; border: none; border-radius: 11px; background: #1d4ed8; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: .55; cursor: default; }
    .msg { font-size: 12.5px; line-height: 1.4; }
    .err { color: #dc2626; }
    .ok { color: #15803d; }
    .muted { color: #64748b; }
    a { color: #1d4ed8; cursor: pointer; }
  </style>
</head>
<body>
  <div class="hd">
    <h1>Capturar factura</h1>
    <div class="prov" id="prov">Detectando proveedor…</div>
  </div>
  <div class="body">
    <label>Monto (COP)<input id="monto" inputmode="numeric" placeholder="$0" /></label>
    <label>Fecha de vencimiento<input id="venc" type="date" /></label>
    <button id="send" disabled>Enviar a Finanzas</button>
    <div class="msg" id="msg"></div>
  </div>
  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
