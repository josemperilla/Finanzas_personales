name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pwa:
    name: Lint + Build + Test (PWA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  drift-check:
    name: Category drift (UI vs webhook.gs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Verifica que CATEGORIES (config.ts) y detectCategory (webhook.gs) estén alineadas.
      # continue-on-error mientras exista el drift conocido de "Bre-B" (el UI la lista,
      # webhook.gs no la asigna). Cambiar a blocking tras arreglarlo.
      - name: Check category drift
        run: node scripts/check-category-drift.mjs
        continue-on-error: true
